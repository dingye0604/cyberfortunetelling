<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周易命理</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="active">首页</a>
  <a href="bazi.html">排盘</a>
  <a href="marriage.html">姻缘</a>
  <a href="knowledge.html">命理知识</a>
</nav>

<div class="container">
  <header>
    <h1>今日宜忌</h1>
    <p class="subtitle" id="dateTitle"></p>
  </header>

  <section class="form-section">
    <div class="form-row">
      <label>选择日期</label>
      <div class="custom-date" id="customDate">
        <div class="custom-date-trigger" id="dateTrigger"></div>
        <div class="custom-date-panel" id="datePanel">
          <div class="date-select-row">
            <div class="date-select-col">
              <label class="date-select-label">年</label>
              <select id="dpYear" class="native-select"></select>
            </div>
            <div class="date-select-col">
              <label class="date-select-label">月</label>
              <select id="dpMonth" class="native-select">
                <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
                <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
                <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
              </select>
            </div>
            <div class="date-select-col">
              <label class="date-select-label">日</label>
              <select id="dpDay" class="native-select"></select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="results" class="results-section">
    <div class="result-block">
      <h2>干支</h2>
      <div id="ganzhi" style="text-align:center;font-size:1.6rem;font-weight:500;color:var(--ink);letter-spacing:0.08em;"></div>
      <div style="text-align:center;font-size:0.85rem;color:var(--ink-light);margin-top:0.4rem;">
        <span id="nayinBadge"></span>
      </div>
    </div>

    <div class="result-block">
      <h2>建除十二神</h2>
      <div style="text-align:center;">
        <span id="jianchuBadge" style="display:inline-block;padding:0.5rem 2rem;font-size:2rem;font-weight:500;color:var(--vermilion);letter-spacing:0.2em;"></span>
      </div>
    </div>

    <div class="result-block" id="yiBlock">
      <h2>宜</h2>
      <div class="yi-ji-list" id="yiList"></div>
    </div>

    <div class="result-block" id="jiBlock">
      <h2>忌</h2>
      <div class="yi-ji-list" id="jiList"></div>
    </div>

    <div class="result-block">
      <h2>纳音</h2>
      <div class="day-info" id="nayinInfo"></div>
    </div>

    <p class="footer-note">命理不可尽信，命运终究掌握在自己的手中。</p>
  </section>
</div>

<script src="js/data.js"></script>
<script src="js/bazi.js"></script>
<script src="js/wuxing.js"></script>
<script src="js/daily.js"></script>
<script src="js/daily-app.js"></script>
</body>
</html>
