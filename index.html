<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周易命理</title>
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="active">首页</a>
  <a href="knowledge.html">命理知识</a>
</nav>

<div class="container">
  <header>
    <h1>周易命理</h1>
    <p class="subtitle">八字 · 五行 · 纳音 · 梅花易数</p>
  </header>

  <section class="form-section">
    <form id="baziForm">
      <div class="form-row">
        <label for="year">出生年</label>
        <select id="year" class="native-select"></select>
      </div>
      <div class="form-row">
        <label for="month">出生月</label>
        <select id="month" class="native-select">
          <option value="1">一月</option>
          <option value="2">二月</option>
          <option value="3">三月</option>
          <option value="4">四月</option>
          <option value="5">五月</option>
          <option value="6">六月</option>
          <option value="7">七月</option>
          <option value="8">八月</option>
          <option value="9">九月</option>
          <option value="10">十月</option>
          <option value="11">十一月</option>
          <option value="12">十二月</option>
        </select>
      </div>
      <div class="form-row">
        <label for="day">出生日</label>
        <select id="day" class="native-select"></select>
      </div>
      <div class="form-row">
        <label for="hour">时辰</label>
        <select id="hour" class="native-select"></select>
        <p class="form-note">子时跨日（23:00—00:59），本工具以所选日期为准</p>
      </div>
      <button type="submit" id="submitBtn">开始排盘</button>
    </form>
  </section>

  <section id="results" class="results-section hidden">
    <div class="result-block">
      <h2>八字</h2>
      <div class="pillars" id="pillars"></div>
    </div>

    <div class="result-block">
      <h2>五行</h2>
      <div id="wuxing"></div>
    </div>

    <div class="result-block">
      <h2>纳音</h2>
      <div id="nayin"></div>
    </div>

    <div class="result-block">
      <h2>命理解读</h2>
      <div id="reading"></div>
    </div>

    <div class="result-block" id="guaBlock">
      <h2>卦象</h2>
      <div id="gua"></div>
    </div>

    <p class="footer-note">节气日期存在 ±1 天的近似偏差。<br>命理推算仅供玩味，人生终究在自己手中。</p>
  </section>
</div>

<script src="js/data.js"></script>
<script src="js/bazi.js"></script>
<script src="js/wuxing.js"></script>
<script src="js/gua.js"></script>
<script src="js/app.js"></script>
</body>
</html>
